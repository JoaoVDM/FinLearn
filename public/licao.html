<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>(function(){var t=localStorage.getItem('fl_theme');if(t)document.documentElement.dataset.theme=t;})()</script>
  <title>Lição — FinLearn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav></nav>

<div class="container">
  <div class="lesson-layout">

    <!-- Main Content -->
    <div class="lesson-main" id="lesson-main">

      <div class="lesson-header">
        <div class="lesson-breadcrumb">
          <a href="trilha.html">Trilha</a>
          <span>/</span>
          <a href="trilha.html" id="bc-module">Módulo</a>
          <span>/</span>
          <span style="color:var(--text-secondary)" id="bc-lesson">Lição</span>
        </div>
        <h1 class="lesson-title-main" id="lesson-title">Carregando...</h1>

        <!-- Mark as complete -->
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;padding:12px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);width:fit-content;transition:all 0.2s">
          <input type="checkbox" id="complete-checkbox" style="width:18px;height:18px;accent-color:var(--accent);cursor:pointer" />
          <span id="check-label" style="font-size:0.875rem;font-weight:500;color:var(--text-secondary)">Marcar como concluída</span>
        </label>
      </div>

      <div class="lesson-body lesson-content" id="lesson-body">
        <div class="loading"><div class="spinner"></div> Carregando lição...</div>
      </div>

      <div class="lesson-actions">
        <a href="trilha.html" id="prev-btn" class="btn btn-secondary">← Anterior</a>
        <a href="" id="next-btn" class="btn btn-primary">Próxima →</a>
      </div>

    </div>

    <!-- Sidebar -->
    <div class="lesson-sidebar">

      <div class="sidebar-card">
        <h3>Progresso do Módulo</h3>
        <div class="progress-bar" style="margin-bottom:8px">
          <div class="progress-fill" id="sidebar-progress-bar" style="width:0%"></div>
        </div>
        <div style="font-size:0.78rem;color:var(--text-muted)" id="sidebar-progress-text">0/0 lições</div>
      </div>

      <div class="sidebar-card">
        <h3>Lições do Módulo</h3>
        <div id="sidebar-lessons"></div>
      </div>

    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
